<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: #fff;
  overflow: hidden;
}

/* Center */
.container {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* 3D Cube */
.cube {
  width: 100px;
  height: 100px;
  margin: auto;
  transform-style: preserve-3d;
  animation: spin 6s linear infinite;
}

.cube div {
  position: absolute;
  width: 100px;
  height: 100px;
  background: rgba(229,9,20,0.8);
  border: 2px solid red;
}

.front { transform: rotateY(0deg) translateZ(50px); }
.back { transform: rotateY(180deg) translateZ(50px); }
.left { transform: rotateY(-90deg) translateZ(50px); }
.right { transform: rotateY(90deg) translateZ(50px); }
.top { transform: rotateX(90deg) translateZ(50px); }
.bottom { transform: rotateX(-90deg) translateZ(50px); }

@keyframes spin {
  0% { transform: rotateX(0) rotateY(0); }
  100% { transform: rotateX(360deg) rotateY(360deg); }
}

/* Loader */
.loader {
  margin: 20px auto;   /* 👈 center karne ke liye */
  width: 250px;
  height: 5px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}
.loader span {
  display: block;
  height: 100%;
  width: 0;
  background: #e50914;
  animation: load 3s infinite;
}

@keyframes load {
  0% { width: 0; }
  50% { width: 100%; }
  100% { width: 0; }
}

/* Text */
h1 {
  margin-top: 20px;
}

p {
  color: #ccc;
}

/* Countdown */
#countdown {
  margin-top: 15px;
  font-size: 22px;
  color: #e50914;
  font-weight: bold;
}
.home-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #e50914;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.home-btn:hover {
  background: #ff1a1a;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <!-- 3D Cube -->
  <div class="cube">
    <div class="front"></div>
    <div class="back"></div>
    <div class="left"></div>
    <div class="right"></div>
    <div class="top"></div>
    <div class="bottom"></div>
  </div>

  <h1>🚧 Website Under Maintenance</h1>
  <p>Sorry for the inconvenience</p>
  <p>This website is currently not working</p>

  <p><strong>We will be back from Monday</strong></p>

  <!-- Countdown -->
  <div id="countdown">Loading...</div>

  <!-- Loader -->
  <div class="loader">
    <span></span>
  </div>

</div>

<script>
function getNextMonday() {
  let now = new Date();
  let day = now.getDay();
  let diff = (8 - day) % 7;
  if(diff === 0) diff = 7;
  now.setDate(now.getDate() + diff);
  now.setHours(0,0,0,0);
  return now;
}

let targetDate = getNextMonday();

function updateCountdown() {
  let now = new Date();
  let diff = targetDate - now;

  if(diff <= 0) {
    document.getElementById("countdown").innerHTML = "Opening payment page... 💳";

    // ✅ Payment page pe bhejo
    window.location.href = "https://payments.cashfree.com/forms?code=Reels-Bundles";
    return;
  }

  let days = Math.floor(diff / (1000*60*60*24));
  let hours = Math.floor((diff / (1000*60*60)) % 24);
  let minutes = Math.floor((diff / (1000*60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
</body>
</html>
