<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#111;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,0,0.6);
}
#timer{color:red;font-size:20px;}
.success-footer{
width:100%;
text-align:center;
padding:18px;
background:linear-gradient(90deg,#000,#111,#000);
color:#888;
font-size:14px;
margin-top:40px;
border-top:1px solid #333;
}
</style>
</head>

<body>

<div class="card">
<h2>✔ Payment Successful</h2>
<p>Redirecting in <span id="timer">5</span> sec...</p>
</div>

<script>
// payment done
localStorage.setItem("payment","done");

// 🔐 token generate
function genToken(){
  return 'tok_' + Date.now() + '_' + Math.random().toString(36).substring(2,10);
}

let token = genToken();

// save token + expiry (10 min)
localStorage.setItem("secureToken", token);
localStorage.setItem("tokenExpiry", Date.now() + (10*60*1000));

// reset old access
localStorage.removeItem("downloadAccess");
localStorage.removeItem("vaultAccess");

// redirect
window.location.href = "download.html?token=" + token;
</script>
<script>
localStorage.setItem("payment","done");

let t=5;
let x=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;
if(t<=0){
clearInterval(x);
window.location.href="download.html?access=yes";
}
},1000);
</script>

<footer class="success-footer">
© 2026 Reels Bundles | Developed by Santosh Koli
</footer>
  
</body>
</html>
