<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
// ❌ direct access block
if(localStorage.getItem("payment") !== "done"){
  window.location.href="error.html";
}
</script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 40px red;
}
.loader{
width:50px;height:50px;border:5px solid #222;border-top:5px solid red;border-radius:50%;
animation:spin 1s linear infinite;margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg);}}
button{width:100%;padding:12px;background:#333;color:white;border:none;margin-top:10px;}
button.active{background:red;}
</style>
</head>

<body>

<div class="card">
<div class="loader" id="loader"></div>
<h2 id="title">Checking Payment...</h2>
<p id="status">Please wait</p>

<p id="countBox" style="display:none;">
Redirecting in <span id="count">5</span>s
</p>

<a href="warning.html">
<button id="btn">Download Now</button>
</a>
</div>

<script>
let loader=document.getElementById("loader");
let title=document.getElementById("title");
let status=document.getElementById("status");
let btn=document.getElementById("btn");
let countBox=document.getElementById("countBox");
let countEl=document.getElementById("count");

setTimeout(()=>{
loader.style.display="none";

let isPaid=localStorage.getItem("payment")==="done";

countBox.style.display="block";
let time=5;

if(isPaid){
title.innerText="Payment Verified";
status.innerText="Download Ready";
btn.classList.add("active");

// 🔐 grant access
localStorage.setItem("downloadAccess","yes");

let t=setInterval(()=>{
time--;
countEl.innerText=time;
if(time<=0){
clearInterval(t);
window.location.href="warning.html";
}
},1000);

}else{
title.innerText="Payment Failed";
status.innerText="Redirecting...";
window.location.href="index.html";
}

},2000);

btn.addEventListener("click",function(e){
if(!btn.classList.contains("active")){
e.preventDefault();
}
});
</script>

</body>
</html>
