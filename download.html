<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  padding:35px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 0 50px rgba(255,0,0,0.6);
  animation:fadeIn 1s ease;
}

/* ICONS */
.loader{
  width:50px;
  height:50px;
  border:5px solid #222;
  border-top:5px solid red;
  border-radius:50%;
  margin:auto;
  animation:spin 1s linear infinite;
}

.tick{
  font-size:60px;
  color:#00ff88;
  display:none;
  animation:pop .5s ease;
}

.cross{
  font-size:60px;
  color:#ff3b3b;
  display:none;
  animation:pop .5s ease;
}

/* TEXT */
h2{
  margin:10px 0;
}

p{
  color:#ccc;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#333;
  border:none;
  color:white;
  border-radius:8px;
  cursor:not-allowed;
  transition:0.3s;
  margin-top:10px;
}

button.active{
  background:red;
  cursor:pointer;
}

button.active:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px red;
}

/* COUNTDOWN */
#count{
  font-size:20px;
  color:#ff4444;
  font-weight:bold;
}

/* PROGRESS BAR */
.progress{
  height:4px;
  background:#222;
  margin-top:20px;
  border-radius:5px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:red;
  animation:load 5s linear forwards;
}

/* ANIMATIONS */
@keyframes spin{
  100%{transform:rotate(360deg);}
}

@keyframes pop{
  0%{transform:scale(0);}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(.9);}
  to{opacity:1;}
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}
</style>
</head>

<body>

<div class="card">

  <div class="loader" id="loader"></div>
  <div class="tick" id="tick">✔</div>
  <div class="cross" id="cross">✖</div>

  <h2 id="title">Checking Payment...</h2>
  <p id="status">Please wait</p>

  <p id="countBox" style="display:none;">
    Redirecting in <span id="count">5</span>s
  </p>

  <a href="warning.html?access=yes">
    <button id="btn">Download Now</button>
  </a>

  <div class="progress">
    <div class="bar"></div>
  </div>

</div>

<script>
// 🔒 BLOCK DIRECT ACCESS
if(!window.location.search){
  window.location.href="error.html";
}

// ✅ CHECK PAYMENT
function checkPayment(){
  return localStorage.getItem("payment") === "done";
}

let loader = document.getElementById("loader");
let tick = document.getElementById("tick");
let cross = document.getElementById("cross");
let title = document.getElementById("title");
let status = document.getElementById("status");
let btn = document.getElementById("btn");
let countBox = document.getElementById("countBox");
let countEl = document.getElementById("count");

// MAIN PROCESS
setTimeout(()=>{
  loader.style.display="none";

  let isPaid = checkPayment();

  countBox.style.display="block";
  let time = 5;

  if(isPaid){
    tick.style.display="block";
    title.innerText="Payment Verified";
    status.innerText="Download Ready ✅";
    btn.classList.add("active");

// 🔥 ADD THIS
  localStorage.setItem("vaultAccess","granted");
  localStorage.setItem("downloadAccess","yes");

    let t = setInterval(()=>{
      time--;
      countEl.innerText = time;

      if(time<=0){
        clearInterval(t);
        window.location.href="warning.html?access=yes";
      }
    },1000);

  } else {
    cross.style.display="block";
    title.innerText="Payment Failed";
    status.innerText="Redirecting...";

    let t = setInterval(()=>{
      time--;
      countEl.innerText = time;

      if(time<=0){
        clearInterval(t);
        window.location.href="index.html";
      }
    },1000);
  }

},2000);

// MANUAL DOWNLOAD
btn.addEventListener("click",function(e){
  if(!btn.classList.contains("active")){
    e.preventDefault();
  }
});
</script>
<script>

// 🚫 F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U block
document.addEventListener('keydown', function(e) {

  // F12
  if (e.key === "F12") {
    e.preventDefault();
    return false;
  }

  // Ctrl+U (View Source)
  if (e.ctrlKey && e.key.toLowerCase() === 'u') {
    e.preventDefault();
    return false;
  }

  // Ctrl+Shift+I (Inspect)
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
    e.preventDefault();
    return false;
  }

  // Ctrl+Shift+J (Console)
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
    e.preventDefault();
    return false;
  }

  // Ctrl+Shift+C (Inspect Element)
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
    e.preventDefault();
    return false;
  }

});

// 🚫 Right click block
document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});

// 🚫 DevTools open detect (advanced trick)
setInterval(function() {
  let before = new Date().getTime();
  debugger;
  let after = new Date().getTime();

  if (after - before > 100) {
    document.body.innerHTML = `
      <h1 style="color:red;text-align:center;margin-top:20%">
      ⚠ DevTools Detected <br> Access Blocked
      </h1>
    `;
  }
}, 1000);

</script>
<script>
// tab switch detect (suspicious activity)
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    document.body.innerHTML = "⚠ Suspicious Activity Detected";
  }
});
</script>
<script>
if(location.hostname !== "reelsbundles.github.io"){
  document.body.innerHTML = "❌ Unauthorized Access";
}
</script>
  
</body>
</html>
