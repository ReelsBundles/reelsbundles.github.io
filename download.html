<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preparing Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
font-family:Arial, sans-serif;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
text-align:center;
}

/* center content */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:40px;
border-radius:15px;
box-shadow:0 0 40px rgba(255,0,0,0.6);
width:90%;
max-width:400px;
}

/* Loader */
.loader{
border:5px solid #333;
border-top:5px solid red;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:0 auto 20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* Tick */
.tick{
display:none;
font-size:60px;
color:#00ff88;
margin-bottom:15px;
}

/* Button */
.btn{
display:none;
background:red;
border:none;
color:white;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

/* Footer */
.success-footer{
width:100%;
text-align:center;
padding:15px;
background:linear-gradient(90deg,#000,#111,#000);
color:#aaa;
font-size:13px;
border-top:1px solid #333;
}
</style>
</head>

<body>

<div class="main">
  <div class="box">

    <div id="loader" class="loader"></div>

    <div id="tick" class="tick">✔</div>

    <h2 id="text">Processing your access...</h2>

    <p id="timerText"></p>

    <button id="btn" class="btn" onclick="goNext()">Continue</button>

  </div>
</div>

<footer class="success-footer">
  © 2026 Reels Bundles | Developed by Santosh Koli
</footer>

<Script>
  
// 🔐 GET TOKEN FROM URL
let params = new URLSearchParams(window.location.search);
let urlToken = params.get("token");

// 🔐 GET STORED DATA
let savedToken = localStorage.getItem("secureToken");
let expiry = localStorage.getItem("tokenExpiry");

// ❌ INVALID TOKEN
if(!urlToken || urlToken !== savedToken){
  alert("Invalid access!");
  window.location.href = "index.html";
}

// ❌ EXPIRED TOKEN (10 min)
if(Date.now() > expiry){
  alert("Session expired! Please pay again.");

  localStorage.removeItem("secureToken");
  localStorage.removeItem("tokenExpiry");

  window.location.href = "index.html";
}

// 🔐 SINGLE USE (optional but strong)
if(localStorage.getItem("usedToken") === urlToken){
  alert("Link already used!");
  window.location.href="index.html";
}

localStorage.setItem("usedToken", urlToken);
  
// ⏳ Loader → Tick
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("tick").style.display="block";
  document.getElementById("text").innerText="Access Granted ✅";

  startTimer();

},2500);

// ⏱ TIMER
function startTimer(){
  let t = 5;
  let timerText = document.getElementById("timerText");
  let btn = document.getElementById("btn");

  timerText.innerText = "Redirecting in " + t + " sec...";
  btn.style.display="inline-block";

  let x = setInterval(()=>{
    t--;
    timerText.innerText = "Redirecting in " + t + " sec...";

    if(t <= 0){
      clearInterval(x);
      goNext();
    }
  },1000);
}

// ➡ redirect
function goNext(){
  window.location.href="warning.html?token=" + urlToken;
}
</script>

</body>
</html>
