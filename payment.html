<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* Header */
.header{
padding:20px;
font-size:24px;
font-weight:bold;
color:red;
}

/* Center content */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Card */
.card{
background:#111;
padding:25px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 15px rgba(255,0,0,0.4);
}

img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.price{
font-size:20px;
margin:10px 0;
color:#0f0;
}

button{
width:100%;
padding:12px;
background:red;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

/* Footer */
.success-footer{
width:100%;
text-align:center;
padding:15px;
background:linear-gradient(90deg,#000,#111,#000);
color:#aaa;
font-size:13px;
border-top:1px solid #333;
}
</style>
</head>

<body>

<div class="header">REELS BUNDLES STORE</div>

<div class="main">
  <div class="card">

    <img src="product.png" alt="Product Image">

    <h2>Premium Reels Bundle</h2>

    <div class="price">₹69</div>

    <button onclick="goToPayment()">Pay Now</button>

  </div>
</div>

<footer class="success-footer">
© 2026 Reels Bundles | Developed by Santosh Koli
</footer>

<!-- 🔐 SECURITY (same logic untouched) -->
<script>
// 🚫 Keys block
document.addEventListener('keydown', function(e){
if (e.key==="F12") e.preventDefault();
if (e.ctrlKey && e.key.toLowerCase()==='u') e.preventDefault();
if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) e.preventDefault();
});

// 🚫 Right click
document.addEventListener("contextmenu", e=>e.preventDefault());

// 🚫 DevTools detect
setInterval(function(){
let before=new Date().getTime();
debugger;
let after=new Date().getTime();
if(after-before>100){
document.body.innerHTML=`<h1 style="color:red;text-align:center;margin-top:20%">⚠ DevTools Detected<br>Access Blocked</h1>`;
}
},1000);

// 🚫 Tab switch
document.addEventListener("visibilitychange", function(){
if(document.hidden){
document.body.innerHTML="⚠ Suspicious Activity Detected";
}
});

// 🚫 Domain check
if(location.hostname!=="reelsbundles.github.io"){
document.body.innerHTML="❌ Unauthorized Access";
}
</script>
<script>
// ✅ POPUP FUNCTION (same alert message)
function showPopup(){
  const popup = document.createElement("div");

  popup.innerText = "🚀 Your website is now live!\nEverything is set up and ready to go.\nEnjoy your new site and start growing 🎉";

  popup.style.position = "fixed";
  popup.style.bottom = "20px";
  popup.style.left = "50%";
  popup.style.transform = "translateX(-50%)";
  popup.style.background = "#111";
  popup.style.color = "#fff";
  popup.style.padding = "12px 20px";
  popup.style.borderRadius = "8px";
  popup.style.boxShadow = "0 0 15px rgba(0,255,150,0.4)";
  popup.style.zIndex = "9999";
  popup.style.fontSize = "14px";
  popup.style.whiteSpace = "pre-line"; // 🔥 multiline support

  document.body.appendChild(popup);

  setTimeout(()=>{
    popup.remove();
  },2500);
}

// ✅ BUTTON ACTION (FIXED)
function goToPayment(){
  showPopup();

  setTimeout(()=>{
    window.location.href = "https://payments.cashfree.com/forms?code=Reels-Bundles";
  },2500);
}
</script>
</body>
</html>
